<!DOCTYPE html>
<html>
<head>
  <title>Typography Example</title>
  <style>
    h1 {
      font-family: 'Georgia', serif;
      font-size: 36px;
      font-weight: bold;
      text-align: center;
      color: darkblue;
      text-shadow: 2px 2px 5px lightgray;
    }
    p {
      font-family: 'Arial', sans-serif;
      font-size: 18px;
      line-height: 1.6;
      letter-spacing: 1px;
      color: green;
    }
  </style>
</head>
<body>
  <h1>Sweta Singh</h1>
  <p>I have completed my Master’s degree. My hobbies are Gym and Swimming.</p>
</body>
</html>
