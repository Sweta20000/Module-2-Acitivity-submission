<!DOCTYPE html>
<html>
<head>
  <title>Text Styling Demo</title>
  <style>
    h1 {
      color: darkblue;
      font-family: 'Georgia', serif;
      font-size: 36px;
      font-weight: bold;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 3px 3px 5px lightgray;
    }
    p {
      font-family: 'Arial', sans-serif;
      font-size: 18px;
      line-height: 1.6;
      letter-spacing: 1px;
      text-indent: 40px;
      color: green;
    }
    a {
      color: red;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Sweta Singh</h1>
  <a href="#">Text styling in CSS is all about making your content readable, attractive, and expressive. There are many properties you can use to control how text looks and behaves.
</a>
</body>
</html>
