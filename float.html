<!DOCTYPE html>
<html>
<head>
  <title>Float Example</title>
  <style>
    img {
      float: left;  
      margin: 10px;
      width: 150px;
    }
    .box {
      float: right;  
      width: 200px;
      height: 100px;
      background: lightblue;
      margin: 10px;
    }
    p {
      font-size: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <img src="https://via.placeholder.com/150" alt="Sample Image">
  <div class="box">This box floats right.</div>
  <p>
    Hello, I am Sweta Singh. I have completed my Master’s degree. 
    My hobbies are Gym and Swimming. Notice how the text wraps around 
    the floated image and box.
  </p>
</body>
</html>
