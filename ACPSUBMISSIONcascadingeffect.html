<!DOCTYPE html>
<html>
<head>
  <title>Cascading Effect Example</title>
  <style>
    h1 { color: red; }         
    .heading { color: green; }  
    #title { color: blue; }     
  </style>
</head>
<body>
  <h1 id="title" class="heading" style="color: purple;">
    Sweta Singh
  </h1>
</body>
</html>
