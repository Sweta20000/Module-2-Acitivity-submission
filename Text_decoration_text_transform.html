<!DOCTYPE html>
<html>
<head>
  <title>Text Decoration & Transform sweta singh</title>
  <style>
    h1 {
      text-decoration: underline;
      text-transform: uppercase;
      color: darkblue;
    }
    p {
      text-decoration: line-through;
      text-transform: capitalize;
      color: green;
    }
    a {
      text-decoration: none;
      text-transform: lowercase;
      color: red;
    }
  </style>
</head>
<body>
  <h1>Sweta Singh</h1>
  <p>i have completed my master’s degree.</p>
  <a href="www.google.com">CLICK HERE</a>
</body>
</html>
