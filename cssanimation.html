<!DOCTYPE html>
<html>
<head>
  <title>CSS Animation Example</title>
  <style>
    h1 {
      color: blue;
      text-align: center;
      animation: fadeMove 3s infinite alternate;
    }
    @keyframes fadeMove {
      from {
        opacity: 0;
        transform: translateY(0px);
      }
      to {
        opacity: 1;
        transform: translateY(30px);
      }
    }
  </style>
</head>
<body>
  <h1>Sweta Singh</h1>
</body>
</html>
