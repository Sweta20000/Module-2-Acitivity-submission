<!DOCTYPE html>
<html lang="en">
<head>
  <title>Internal CSS Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      margin: 20px;
    }
    h1 {
      color: blue;
      text-align: center;
    }
    p {
      font-size: 18px;
      color: green;
    }
    ul {
      background-color: lightyellow;
      padding: 10px;
      border: 1px solid #ccc;
    }
    li {
      color: purple;
    }
  </style>
</head>
<body>
  <h1>Sweta Singh</h1>
  <p>I have completed my Master’s degree.</p>
  
  <h2>My Hobbies</h2>
  <ul>
    <li>Gym</li>
    <li>Swimming</li>
  </ul>
</body>
</html>
