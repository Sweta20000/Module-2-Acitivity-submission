<!DOCTYPE html>
<html>
<head>
  <title>Active Example</title>
  <style>
    a:active {
      color: red;  
    }
    button:active {
      background-color: orange; /* button turns orange when pressed */
    }
  </style>
</head>
<body>
  <a href="#">Click Me</a><br><br>
  <button>Press Me</button>
</body>
</html>
