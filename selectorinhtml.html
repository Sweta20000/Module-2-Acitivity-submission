<!DOCTYPE html>
<html>
<head>
  <title>CSS Selectors Demo</title>
  <style>
    h1 { color: blue; }
    #intro { font-size: 18px; color: green; }

    .highlight { background-color: yellow; }
    input[type="email"] { border: 2px solid red; }
  </style>
</head>
<body>
  <h1>Sweta Singh</h1>
  <p id="intro">I have completed my Master’s degree.</p>
  <p class="highlight">My hobbies are Gym and Swimming.</p>
  
  <form>
    Email: <input type="email" name="email"><br><br>
  </form>
</body>
</html>
