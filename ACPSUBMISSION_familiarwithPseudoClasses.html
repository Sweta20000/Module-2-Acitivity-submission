<!DOCTYPE html>
<html>
<head>
  <title>Pseudo-Class Demo</title>
  <style>
    a:hover {
      color: red;
      text-decoration: underline;
    }
    input:focus {
      border: 2px solid blue;
      background-color: lightyellow;
    }
    button:active {
      background-color: orange;
    }
    button:disabled {
      background-color: lightgray;
      cursor: not-allowed;
    }
    li:first-child {
      font-weight: bold;
    }
    li:nth-child(3) {
      color: green;
    }
  </style>
</head>
<body>
  <a href="#">In CSS, pseudo-classes are special keywords added to selectors that define the state of an element. They let you style elements dynamically based on user interaction or their position in the document.
</a><br><br>
  <input type="text" placeholder="Click or tab here"><br><br>
  <button>Active Button</button>
  <button disabled>Disabled Button</button>
  <ul>
    <li>First Item</li>
    <li>Second Item</li>
    <li>Third Item</li>
  </ul>
</body>
</html>
