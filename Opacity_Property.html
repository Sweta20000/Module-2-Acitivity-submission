<!DOCTYPE html>
<html>
<head>
  <title>Opacity Example</title>
  <style>
    .box {
      width: 200px;
      height: 100px;
      background: blue;
      margin: 20px;
      color: white;
      text-align: center;
      line-height: 100px;
      font-weight: bold;
    }
    .half {
      opacity: 0.5; 
    }
    .hidden {
      opacity: 0; 
    }
  </style>
</head>
<body>
  <div class="box">Normal</div>
  <div class="box half">50% Opacity</div>
  <div class="box hidden">Invisible</div>
</body>
</html>
