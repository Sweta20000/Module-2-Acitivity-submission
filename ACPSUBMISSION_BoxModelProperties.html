<!DOCTYPE html>
<html>
<head>
  <title>Box Model Properties</title>
  <style>
    .box {
      width: 200px;              
      height: 500px;            
      background-color: lightblue;
      padding: 20px;            
      border: 5px solid darkblue;
      margin: 30px;              
      box-sizing: border-box;    
    }
  </style>
</head>
<body>
  <div class="box">
    The Box Model properties in CSS define how every element is 
    structured and spaced on a webpage. They control the content, 
    padding, border, and margin around elements. Understanding these 
    properties is essential for layout design.

  </div>
</body>
</html>
