<!DOCTYPE html>
<html>
<head>
  <title>Text & Box Effects</title>
  <style>
    h1 {
      text-shadow: 3px 3px 5px gray;
      color: darkblue;
      text-align: center;
    }
    p {
      text-indent: 40px;
      font-size: 18px;
      color: green;
    }
    .box {
      width: 200px;
      height: 100px;
      background: lightyellow;
      margin: 20px auto;
      padding: 10px;
      box-shadow: 5px 5px 10px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <h1>Sweta Singh</h1>
  <p>I have completed my Master’s degree. My hobbies are Gym and Swimming.</p>
  <div class="box">
    This is a box with shadow.
  </div>
</body>
</html>
