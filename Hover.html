<!DOCTYPE html>
<html>
<head>
  <title>Hover Example- sweta singh</title>
  <style>
    a {
      color: blue;
      text-decoration: none;
    }
    a:hover {
      color: red;            
      text-decoration: underline;
    }
    button {
      background-color: lightblue;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
    }
    button:hover {
      background-color: orange; 
      transform: scale(1.1);  
    }
  </style>
</head>
<body>
  <a href="#">Hover over this link</a><br><br>
  <button>Hover Me</button><br><br>
</body>
</html>
